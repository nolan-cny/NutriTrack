<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profil - NutriTrack</title>

    <link rel="stylesheet" href="../style.css">

</head>


<body>


<header>

    <h1>Mon Profil</h1>

</header>


<main>


    <div class="card profil-card">


        <img 
        src="../assets/avatar.png" 
        class="avatar"
        id="avatar"
        alt="Photo de profil">


        <h2 id="username">
            Pseudo utilisateur
        </h2>


        <p id="email">
            email@example.com
        </p>


    </div>



    <div class="card">


        <h2>Informations</h2>


        <p>
            📏 Taille :
            <span id="height">
                169 cm
            </span>
        </p>


        <p>
            ⚖️ Poids :
            <span id="weight">
                53 kg
            </span>
        </p>


        <p>
            🎂 Âge :
            <span id="age">
                17 ans
            </span>
        </p>


        <p>
            🎯 Objectif :
            <span id="goal">
                Prise de masse
            </span>
        </p>


        <p>
            🔥 Objectif calories :
            <span id="calories">
                2500 kcal
            </span>
        </p>


    </div>



    <button id="edit-profile">
        Modifier mon profil
    </button>



</main>


<script src="../js/profil.js"></script>


</body>

</html>
