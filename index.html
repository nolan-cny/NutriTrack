<body>



<div class="auth-container">


<h1>
NutriTrack
</h1>


<h2>
Connexion
</h2>



<input
id="email"
type="email"
placeholder="Email">



<input
id="password"
type="password"
placeholder="Mot de passe">



<button id="loginBtn">

Se connecter

</button>



<button id="googleBtn">

Continuer avec Google

</button>



<p>

Pas encore inscrit ?

<a href="pages/inscription.html">

Créer un compte

</a>

</p>



</div>




<script type="module">


import {

loginUser,
loginGoogle

}

from "../js/auth.js";




// Connexion classique


document
.getElementById("loginBtn")
.addEventListener(
"click",
async()=>{


const email =
document.getElementById("email").value;



const password =
document.getElementById("password").value;



try{


await loginUser(
email,
password
);



window.location.href =
"../index.html";



}catch(error){


alert(error.message);


}


});




// Google


document
.getElementById("googleBtn")
.addEventListener(
"click",
async()=>{


try{


await loginGoogle();


window.location.href =
"../index.html";



}catch(error){


alert(error.message);


}



});



</script>



</body>
